<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生日快乐!</title>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Comic Sans MS', cursive, sans-serif;
  overflow: hidden;
  position: relative;
}



/* 视频蛋糕容器 */
.cake-container {
  z-index: 10;
  position: relative;
}

.cake-wrapper {
  position: relative;
}

/* 视频样式 */
.cake-video {
  width: 350px;
  height: 620px;
  object-fit: cover;
  display: block;
  transition: opacity 0.5s ease;
}

.cake-video.hidden {
  opacity: 0;
  pointer-events: none;
}

/* 熄灭后的静态蛋糕 */
.cake-blown {
  position: absolute;
  top: 0;
  left: 0;
  width: 350px;
  height: 350px;
  display: none;
  align-items: center;
  justify-content: center;
}

.cake-blown.show {
  display: flex;
}

.cake-blown-inner {
  position: relative;
  transform-style: preserve-3d;
}

/* 简化的熄灭蛋糕 */
.blown-cake-img {
  font-size: 150px;
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
}

/* 烟雾效果 */
.smoke-container {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 15px;
}

.smoke {
  width: 10px;
  height: 10px;
  background: rgba(200, 200, 200, 0.7);
  border-radius: 50%;
  opacity: 0;
}

.smoke.active {
  animation: smokeRise 2s ease-out forwards;
}

@keyframes smokeRise {
  0% { opacity: 0.8; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-100px) scale(4); }
}

/* 提示文字 */
.hint {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
}

.hint p {
  color: #333;
  font-size: 1rem;
  margin: 8px 0;
}

.hint .blow-hint {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 12px 24px;
  background: rgba(0,0,0,0.05);
  border-radius: 30px;
  margin-top: 15px;
  cursor: pointer;
  transition: all 0.3s;
  color: #333;
}

.hint .blow-hint:hover {
  background: rgba(0,0,0,0.1);
}

.hint .blow-hint.disabled {
  opacity: 0.5;
  pointer-events: none;
}

.blow-icon {
  font-size: 1.5rem;
  animation: breathe 2s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* 庆祝特效 */
.confetti {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 100;
}

.confetti-piece {
  position: absolute;
  width: 10px;
  height: 20px;
  top: -20px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* 许愿文字 */
.wish-text {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 3rem;
  color: #ffd700;
  text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
  opacity: 0;
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}

.wish-text.show {
  animation: wishAppear 3s ease-out forwards;
}

@keyframes wishAppear {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
}

/* 麦克风状态 */
.mic-status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 16px;
  background: rgba(0,0,0,0.6);
  border-radius: 20px;
  color: white;
  font-size: 0.8rem;
  z-index: 50;
}

.mic-status.listening {
  background: rgba(76, 175, 80, 0.7);
}

.mic-status.listening::before {
  content: '🎤 ';
}

/* 重新点燃按钮 */
.relight-btn {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  background: rgba(255, 152, 0, 0.8);
  border: none;
  border-radius: 20px;
  color: white;
  font-size: 0.9rem;
  cursor: pointer;
  z-index: 50;
  display: none;
  transition: all 0.3s;
}

.relight-btn:hover {
  background: rgba(255, 152, 0, 1);
}

.relight-btn.show {
  display: block;
}



/* 吹灭后的小猫咪唱歌视频 */
.cat-singing-container {
  display: none;
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
}

.cat-singing-container.show {
  display: block;
}

.cat-singing-video {
  width: 250px;
  height: 300px;
  object-fit: cover;
  border-radius: 10px;
}

/* 音乐控制按钮 */
.music-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.2);
  font-size: 1.5rem;
  cursor: pointer;
  z-index: 100;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}

.music-btn:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: scale(1.1);
}

.music-btn.playing {
  animation: musicPulse 1s ease-in-out infinite;
}

@keyframes musicPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
  </style>
</head>
<body>

  <!-- 背景音乐 -->
  <audio id="bg-music" loop>
    <source src="background-music.mp3" type="audio/mpeg">
  </audio>


  <div class="cake-container" id="cake-container">
    <div class="cake-wrapper" id="cake-wrapper">
      <!-- 蜡烛燃烧视频 -->
      <video
        class="cake-video"
        id="cake-video"
        autoplay
        loop
        playsinline
      >
        <source src="candle-video.mp4" type="video/mp4">
      </video>


      <!-- 吹灭后的蛋糕 -->
      <div class="cake-blown" id="cake-blown">
        <div class="cake-blown-inner">
          <div class="smoke-container">
            <div class="smoke" id="smoke-1"></div>
            <div class="smoke" id="smoke-2"></div>
            <div class="smoke" id="smoke-3"></div>
          </div>
          <div class="blown-cake-img">🎂</div>
        </div>
      </div>
    </div>
  </div>

  <div class="hint">
    <div class="blow-hint" id="blow-btn">
      <span class="blow-icon">💨</span>
      <span>点击或对着麦克风吹气熄灭蜡烛</span>
    </div>
  </div>

  <!-- 吹灭后显示的小猫咪唱歌视频 -->
  <div class="cat-singing-container" id="cat-singing-container">
    <video class="cat-singing-video" id="cat-singing-video" playsinline>
      <source src="cat-singing.mp4" type="video/mp4">
    </video>
  </div>

  <button class="relight-btn" id="relight-btn">🔥 重新点燃蜡烛</button>

  <div class="confetti" id="confetti"></div>
  <div class="wish-text" id="wish-text">🎉 愿望成真 🎉</div>
  <div class="mic-status" id="mic-status">点击页面开启麦克风</div>

  <!-- 音乐控制按钮 -->
  <button class="music-btn" id="music-btn">🎵</button>

  <script>

// 元素引用
const cakeVideo = document.getElementById('cake-video');
const cakeBlown = document.getElementById('cake-blown');
const blowBtn = document.getElementById('blow-btn');
const relightBtn = document.getElementById('relight-btn');
const wishText = document.getElementById('wish-text');
const micStatus = document.getElementById('mic-status');

// 蜡烛状态
let candlesLit = true;

// 小猫咪唱歌视频
const catSingingContainer = document.getElementById('cat-singing-container');
const catSingingVideo = document.getElementById('cat-singing-video');

// 吹灭蜡烛
function blowOutCandles() {
  if (!candlesLit) return;
  candlesLit = false;

  // 隐藏视频，显示熄灭蛋糕
  cakeVideo.pause();
  cakeVideo.classList.add('hidden');
  cakeBlown.classList.add('show');

  // 停止背景音乐
  bgMusic.pause();
  musicBtn.textContent = '🎵';
  musicBtn.classList.remove('playing');

  // 烟雾效果
  for (let i = 1; i <= 3; i++) {
    const smoke = document.getElementById(`smoke-${i}`);
    setTimeout(() => {
      smoke.classList.add('active');
      setTimeout(() => smoke.classList.remove('active'), 2000);
    }, i * 200);
  }

  // 禁用吹气按钮
  blowBtn.classList.add('disabled');

  // 显示祝福
  setTimeout(() => {
    wishText.classList.add('show');
    createConfetti();
  }, 500);

  // 显示小猫咪唱歌视频并播放
  setTimeout(() => {
    catSingingContainer.classList.add('show');
    catSingingVideo.play();
  }, 1000);

  // 显示重新点燃按钮
  setTimeout(() => {
    relightBtn.classList.add('show');
  }, 2000);
}

// 点击吹灭
blowBtn.addEventListener('click', blowOutCandles);

// 重新点燃
relightBtn.addEventListener('click', () => {
  candlesLit = true;
  cakeVideo.classList.remove('hidden');
  cakeVideo.currentTime = 0;
  cakeVideo.muted = true;
  cakeVideo.play();
  cakeBlown.classList.remove('show');
  blowBtn.classList.remove('disabled');
  wishText.classList.remove('show');
  relightBtn.classList.remove('show');

  // 隐藏小猫咪视频并停止播放
  catSingingContainer.classList.remove('show');
  catSingingVideo.pause();
  catSingingVideo.currentTime = 0;

  // 重新播放背景音乐
  bgMusic.currentTime = 0;
  bgMusic.play();
  musicBtn.textContent = '🔊';
  musicBtn.classList.add('playing');
});

// 麦克风检测吹气
async function startMicrophone() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioContext = new AudioContext();
    const analyser = audioContext.createAnalyser();
    const microphone = audioContext.createMediaStreamSource(stream);
    microphone.connect(analyser);

    analyser.fftSize = 256;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    micStatus.textContent = '正在聆听...';
    micStatus.classList.add('listening');

    let blowThreshold = 150;
    let blowDuration = 0;
    let requiredDuration = 10;

    function detectBlow() {
      analyser.getByteFrequencyData(dataArray);

      // 检测低频能量（吹气声主要在低频）
      let lowFreqSum = 0;
      for (let i = 0; i < 10; i++) {
        lowFreqSum += dataArray[i];
      }
      const avgLowFreq = lowFreqSum / 10;

      if (avgLowFreq > blowThreshold) {
        blowDuration++;
        if (blowDuration >= requiredDuration && candlesLit) {
          blowOutCandles();
          blowDuration = 0;
        }
      } else {
        blowDuration = Math.max(0, blowDuration - 1);
      }

      requestAnimationFrame(detectBlow);
    }

    detectBlow();
  } catch (err) {
    console.log('麦克风访问被拒绝', err);
    micStatus.textContent = '麦克风未授权，请点击按钮吹灭';
  }
}

// 点击页面启动麦克风
document.addEventListener('click', () => {
  if (micStatus.textContent === '点击页面开启麦克风') {
    startMicrophone();
  }
}, { once: true });

// 彩带特效
function createConfetti() {
  const confetti = document.getElementById('confetti');
  const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6b9d', '#c9b1ff'];

  for (let i = 0; i < 100; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    confetti.appendChild(piece);

    setTimeout(() => piece.remove(), 4000);
  }
}

// 背景音乐控制
const bgMusic = document.getElementById('bg-music');
const musicBtn = document.getElementById('music-btn');

// 尝试自动播放音乐
bgMusic.play().then(() => {
  musicBtn.textContent = '🔊';
  musicBtn.classList.add('playing');
}).catch(() => {
  // 浏览器阻止了自动播放，需要用户点击
  musicBtn.textContent = '🎵';
});

// 点击页面任意位置开始播放音乐
document.addEventListener('click', () => {
  if (bgMusic.paused) {
    bgMusic.play();
    musicBtn.textContent = '🔊';
    musicBtn.classList.add('playing');
  }
}, { once: true });

// 音乐按钮控制暂停/播放
musicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (bgMusic.paused) {
    bgMusic.play();
    musicBtn.textContent = '🔊';
    musicBtn.classList.add('playing');
  } else {
    bgMusic.pause();
    musicBtn.textContent = '🎵';
    musicBtn.classList.remove('playing');
  }
});

// 蜡烛视频始终静音播放（声音由小猫咪视频提供）
cakeVideo.muted = true;
cakeVideo.play().catch(() => {});
  </script>
</body>
</html>
